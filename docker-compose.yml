services:
  video-cutter:
    build: .
    container_name: video-cutter
    restart: unless-stopped
    env_file:
      - .env
    environment:
      OUTPUT_DIR: /app/outputs
    ports:
      - "127.0.0.1:7860:7860"
    volumes:
      - ./outputs:/app/outputs
    tmpfs:
      - /tmp:size=4G
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          memory: 1G
