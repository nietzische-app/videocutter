<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Video Kesici</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, Segoe UI, Arial, sans-serif;
      background: #f5f7fb;
      color: #172033;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
    }

    main {
      width: min(760px, 100%);
      background: #ffffff;
      border: 1px solid #d9e1ef;
      border-radius: 12px;
      box-shadow: 0 18px 60px rgba(24, 39, 75, 0.12);
      padding: 32px;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 28px;
      line-height: 1.2;
    }

    .subtitle {
      margin: 0 0 24px;
      font-size: 14px;
      color: #64748b;
    }

    label {
      display: block;
      margin: 16px 0 6px;
      font-weight: 700;
      font-size: 13px;
      color: #374151;
    }

    input, select {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 11px 13px;
      font: inherit;
      font-size: 14px;
      background: #fff;
      transition: border-color 0.2s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #1967d2;
      box-shadow: 0 0 0 3px rgba(25, 103, 210, 0.12);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 140px;
      gap: 14px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0;
      margin-top: 16px;
      border-bottom: 2px solid #e2e8f0;
    }

    .tab {
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 700;
      color: #64748b;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
      background: none;
      border-top: 0;
      border-left: 0;
      border-right: 0;
      width: auto;
    }

    .tab:hover { color: #1967d2; }

    .tab.active {
      color: #1967d2;
      border-bottom-color: #1967d2;
    }

    .tab-panel {
      display: none;
      padding-top: 12px;
    }

    .tab-panel.active { display: block; }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed #d1d5db;
      border-radius: 10px;
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #f8fafc;
    }

    .drop-zone:hover, .drop-zone.dragover {
      border-color: #1967d2;
      background: #eff6ff;
    }

    .drop-zone-icon {
      font-size: 36px;
      margin-bottom: 8px;
      display: block;
    }

    .drop-zone-text {
      font-size: 14px;
      color: #475569;
    }

    .drop-zone-hint {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 4px;
    }

    .file-selected {
      margin-top: 8px;
      font-size: 13px;
      color: #16a34a;
      font-weight: 600;
    }

    .upload-progress {
      display: none;
      margin-top: 10px;
    }

    .upload-bar {
      height: 6px;
      background: #e2e8f0;
      border-radius: 3px;
      overflow: hidden;
    }

    .upload-bar-fill {
      height: 100%;
      background: #1967d2;
      border-radius: 3px;
      width: 0%;
      transition: width 0.3s;
    }

    .upload-text {
      font-size: 12px;
      color: #64748b;
      margin-top: 4px;
    }

    button.main-btn {
      margin-top: 22px;
      width: 100%;
      border: 0;
      border-radius: 8px;
      padding: 13px 16px;
      background: #1967d2;
      color: white;
      font: inherit;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: background 0.2s;
    }

    button.main-btn:hover:not(:disabled) {
      background: #1557b0;
    }

    button.main-btn:disabled {
      background: #94a3b8;
      cursor: wait;
    }

    /* Progress steps */
    .progress-container {
      display: none;
      margin-top: 24px;
      padding: 20px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
    }

    .steps {
      display: flex;
      gap: 4px;
      justify-content: space-between;
      position: relative;
    }

    .steps::before {
      content: "";
      position: absolute;
      top: 15px;
      left: 20px;
      right: 20px;
      height: 2px;
      background: #e2e8f0;
      z-index: 0;
    }

    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      z-index: 1;
    }

    .dot {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #e2e8f0;
      display: grid;
      place-items: center;
      font-size: 13px;
      font-weight: 700;
      color: #94a3b8;
      transition: all 0.3s;
      border: 2px solid #e2e8f0;
    }

    .step.active .dot {
      background: #fff;
      border-color: #1967d2;
      color: #1967d2;
      box-shadow: 0 0 0 4px rgba(25, 103, 210, 0.15);
    }

    .step.done .dot {
      background: #16a34a;
      border-color: #16a34a;
      color: #fff;
    }

    .step-label {
      font-size: 11px;
      margin-top: 6px;
      color: #94a3b8;
      font-weight: 600;
      text-align: center;
    }

    .step.active .step-label { color: #1967d2; }
    .step.done .step-label { color: #16a34a; }

    #stepMessage {
      margin-top: 12px;
      font-size: 13px;
      color: #475569;
      text-align: center;
    }

    /* Result section */
    .result-section {
      display: none;
      margin-top: 20px;
      padding: 20px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 10px;
      text-align: center;
    }

    .result-section h3 {
      margin: 0 0 12px;
      color: #166534;
      font-size: 16px;
    }

    .result-section video {
      width: 100%;
      max-height: 480px;
      border-radius: 8px;
      background: #000;
    }

    .result-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 14px;
    }

    .result-actions a {
      display: inline-block;
      padding: 10px 24px;
      background: #1967d2;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
      transition: background 0.2s;
    }

    .result-actions a:hover {
      background: #1557b0;
    }

    /* Error box */
    .error-box {
      display: none;
      margin-top: 20px;
      padding: 14px 18px;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 10px;
      color: #991b1b;
      font-size: 14px;
      font-weight: 600;
    }

    /* Log */
    pre {
      display: none;
      margin: 16px 0 0;
      max-height: 220px;
      overflow: auto;
      white-space: pre-wrap;
      background: #0f172a;
      color: #d1fae5;
      border-radius: 8px;
      padding: 14px;
      font-size: 12px;
      line-height: 1.5;
    }

    .toggle-log {
      display: none;
      margin-top: 12px;
      background: none;
      border: 1px solid #d1d5db;
      color: #475569;
      font-size: 12px;
      padding: 6px 14px;
      cursor: pointer;
      width: auto;
      border-radius: 6px;
    }

    .toggle-log:hover { background: #f1f5f9; }

    @media (max-width: 640px) {
      body { padding: 12px; }
      main { padding: 20px; }
      .row { grid-template-columns: 1fr; }
      h1 { font-size: 22px; }
      .dot { width: 24px; height: 24px; font-size: 11px; }
      .step-label { font-size: 10px; }
      .result-section video { max-height: 60vh; }
      .drop-zone { padding: 20px 14px; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Video Kesici</h1>
    <p class="subtitle">Video yukleyin veya YouTube linki girin, yapay zeka en iyi ani secip dikey klip uretsin.</p>

    <div class="tabs">
      <button class="tab active" data-tab="upload">Dosya Yukle</button>
      <button class="tab" data-tab="youtube">YouTube Linki</button>
    </div>

    <div class="tab-panel active" id="panel-upload">
      <div class="drop-zone" id="dropZone">
        <span class="drop-zone-icon">&#128193;</span>
        <div class="drop-zone-text">Videoyu surukle birak veya tiklayip sec</div>
        <div class="drop-zone-hint">MP4, MKV, AVI, MOV, WEBM - Maks 2 GB</div>
      </div>
      <input type="file" id="fileInput" accept=".mp4,.mkv,.avi,.mov,.webm,.m4v,.flv,.wmv" style="display:none">
      <div class="file-selected" id="fileSelected"></div>
      <div class="upload-progress" id="uploadProgress">
        <div class="upload-bar"><div class="upload-bar-fill" id="uploadBarFill"></div></div>
        <div class="upload-text" id="uploadText">Yukleniyor...</div>
      </div>
    </div>

    <div class="tab-panel" id="panel-youtube">
      <label for="videoInput">YouTube linki</label>
      <input id="videoInput" placeholder="https://www.youtube.com/watch?v=..." autocomplete="off">
    </div>

    <div class="row">
      <div>
        <label for="apiKey">OpenAI API Key</label>
        <input id="apiKey" type="password" placeholder="Sunucuda kayitliysa bos birakin" autocomplete="off">
      </div>
      <div>
        <label for="clipSeconds">Sure (sn)</label>
        <input id="clipSeconds" type="number" min="5" max="180" value="30">
      </div>
    </div>

    <button class="main-btn" id="startButton">Klibi olustur</button>

    <div class="progress-container" id="progress">
      <div class="steps">
        <div class="step" data-step="1">
          <span class="dot">1</span>
          <span class="step-label">Hazirlama</span>
        </div>
        <div class="step" data-step="2">
          <span class="dot">2</span>
          <span class="step-label">Ses</span>
        </div>
        <div class="step" data-step="3">
          <span class="dot">3</span>
          <span class="step-label">Transkript</span>
        </div>
        <div class="step" data-step="4">
          <span class="dot">4</span>
          <span class="step-label">AI Analiz</span>
        </div>
        <div class="step" data-step="5">
          <span class="dot">5</span>
          <span class="step-label">Kesim</span>
        </div>
      </div>
      <div id="stepMessage"></div>
    </div>

    <div class="result-section" id="resultSection">
      <h3>Klip hazir!</h3>
      <video id="videoPreview" controls playsinline></video>
      <div class="result-actions">
        <a id="downloadLink" href="#">MP4 Indir</a>
      </div>
    </div>

    <div class="error-box" id="errorBox"></div>

    <button class="toggle-log" id="toggleLog">Isleme logunu goster</button>
    <pre id="log"></pre>
  </main>

  <script>
    const startButton = document.getElementById("startButton");
    const logBox = document.getElementById("log");
    const downloadLink = document.getElementById("downloadLink");
    const progressEl = document.getElementById("progress");
    const resultSection = document.getElementById("resultSection");
    const errorBox = document.getElementById("errorBox");
    const stepMessage = document.getElementById("stepMessage");
    const toggleLog = document.getElementById("toggleLog");
    const videoPreview = document.getElementById("videoPreview");
    const dropZone = document.getElementById("dropZone");
    const fileInput = document.getElementById("fileInput");
    const fileSelected = document.getElementById("fileSelected");
    const uploadProgress = document.getElementById("uploadProgress");
    const uploadBarFill = document.getElementById("uploadBarFill");
    const uploadText = document.getElementById("uploadText");

    let uploadedFilePath = null;
    let activeTab = "upload";

    // Tab switching
    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
        tab.classList.add("active");
        const panel = document.getElementById("panel-" + tab.dataset.tab);
        panel.classList.add("active");
        activeTab = tab.dataset.tab;
      });
    });

    // Drop zone
    dropZone.addEventListener("click", () => fileInput.click());

    dropZone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropZone.classList.add("dragover");
    });

    dropZone.addEventListener("dragleave", () => {
      dropZone.classList.remove("dragover");
    });

    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.classList.remove("dragover");
      if (e.dataTransfer.files.length > 0) {
        handleFile(e.dataTransfer.files[0]);
      }
    });

    fileInput.addEventListener("change", () => {
      if (fileInput.files.length > 0) {
        handleFile(fileInput.files[0]);
      }
    });

    function handleFile(file) {
      const ext = file.name.split(".").pop().toLowerCase();
      const allowed = ["mp4", "mkv", "avi", "mov", "webm", "m4v", "flv", "wmv"];
      if (!allowed.includes(ext)) {
        errorBox.textContent = "Desteklenmeyen dosya formati. MP4, MKV, AVI, MOV, WEBM desteklenir.";
        errorBox.style.display = "block";
        return;
      }
      if (file.size > 2 * 1024 * 1024 * 1024) {
        errorBox.textContent = "Dosya boyutu 2 GB'dan buyuk olamaz.";
        errorBox.style.display = "block";
        return;
      }

      errorBox.style.display = "none";
      fileSelected.textContent = file.name + " (" + (file.size / 1024 / 1024).toFixed(1) + " MB)";
      uploadedFilePath = null;

      // Upload
      uploadProgress.style.display = "block";
      uploadBarFill.style.width = "0%";
      uploadText.textContent = "Yukleniyor...";

      const formData = new FormData();
      formData.append("file", file);

      const xhr = new XMLHttpRequest();
      xhr.open("POST", "/api/upload");

      xhr.upload.addEventListener("progress", (e) => {
        if (e.lengthComputable) {
          const pct = Math.round((e.loaded / e.total) * 100);
          uploadBarFill.style.width = pct + "%";
          uploadText.textContent = pct + "% yuklendi";
        }
      });

      xhr.addEventListener("load", () => {
        if (xhr.status === 200) {
          const data = JSON.parse(xhr.responseText);
          uploadedFilePath = data.path;
          uploadBarFill.style.width = "100%";
          uploadText.textContent = "Yukleme tamamlandi!";
        } else {
          const data = JSON.parse(xhr.responseText);
          uploadProgress.style.display = "none";
          fileSelected.textContent = "";
          errorBox.textContent = data.error || "Yukleme basarisiz.";
          errorBox.style.display = "block";
        }
      });

      xhr.addEventListener("error", () => {
        uploadProgress.style.display = "none";
        fileSelected.textContent = "";
        errorBox.textContent = "Baglanti hatasi. Tekrar deneyin.";
        errorBox.style.display = "block";
      });

      xhr.send(formData);
    }

    toggleLog.addEventListener("click", () => {
      const visible = logBox.style.display === "block";
      logBox.style.display = visible ? "none" : "block";
      toggleLog.textContent = visible ? "Isleme logunu goster" : "Logu gizle";
    });

    function resetUI() {
      resultSection.style.display = "none";
      errorBox.style.display = "none";
      logBox.style.display = "none";
      logBox.textContent = "";
      toggleLog.style.display = "none";
      toggleLog.textContent = "Isleme logunu goster";
      videoPreview.removeAttribute("src");
      progressEl.style.display = "block";
      document.querySelectorAll(".step").forEach(el => {
        el.classList.remove("done", "active");
      });
      stepMessage.textContent = "";
    }

    function updateSteps(stepStr) {
      if (!stepStr) return;
      const match = stepStr.match(/(\d+)\/(\d+)/);
      if (!match) return;
      const current = parseInt(match[1]);
      document.querySelectorAll(".step").forEach(el => {
        const s = parseInt(el.dataset.step);
        el.classList.toggle("done", s < current);
        el.classList.toggle("active", s === current);
      });
    }

    function markAllDone() {
      document.querySelectorAll(".step").forEach(el => {
        el.classList.add("done");
        el.classList.remove("active");
      });
    }

    async function pollJob(jobId) {
      let response;
      try {
        response = await fetch(`/api/jobs/${jobId}`);
      } catch {
        setTimeout(() => pollJob(jobId), 3000);
        return;
      }
      const job = await response.json();

      if (job.step) updateSteps(job.step);
      stepMessage.textContent = job.message || "";

      if (job.log) {
        toggleLog.style.display = "block";
        logBox.textContent = job.log;
        logBox.scrollTop = logBox.scrollHeight;
      }

      if (job.status === "done") {
        startButton.disabled = false;
        markAllDone();
        stepMessage.textContent = "";

        resultSection.style.display = "block";
        downloadLink.href = job.download_url;
        if (job.preview_url) {
          videoPreview.src = job.preview_url;
        }
        return;
      }

      if (job.status === "failed") {
        startButton.disabled = false;
        progressEl.style.display = "none";
        errorBox.textContent = job.message || "Islem basarisiz oldu.";
        errorBox.style.display = "block";
        return;
      }

      setTimeout(() => pollJob(jobId), 2000);
    }

    startButton.addEventListener("click", async () => {
      let videoInput;

      if (activeTab === "upload") {
        if (!uploadedFilePath) {
          errorBox.textContent = "Lutfen once bir video dosyasi yukleyin.";
          errorBox.style.display = "block";
          return;
        }
        videoInput = uploadedFilePath;
      } else {
        videoInput = document.getElementById("videoInput").value.trim();
        if (!videoInput) {
          errorBox.textContent = "Lutfen bir YouTube linki girin.";
          errorBox.style.display = "block";
          return;
        }
      }

      startButton.disabled = true;
      resetUI();

      const payload = {
        video_input: videoInput,
        api_key: document.getElementById("apiKey").value,
        clip_seconds: Number(document.getElementById("clipSeconds").value || 30)
      };

      try {
        const response = await fetch("/api/jobs", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || "Islem baslatilamadi.");
        }
        pollJob(data.job_id);
      } catch (error) {
        progressEl.style.display = "none";
        errorBox.textContent = error.message;
        errorBox.style.display = "block";
        startButton.disabled = false;
      }
    });
  </script>
</body>
</html>
